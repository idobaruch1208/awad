name: Publish Scheduled Posts

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger publish-scheduled cron endpoint
        run: |
          curl -X POST "${{ secrets.DEPLOYED_URL }}/api/cron/publish-scheduled" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail \
            --silent \
            --show-error
